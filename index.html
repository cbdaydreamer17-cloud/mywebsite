<!DOCTYPE html>
<html>
<head>

<title>Abelaye Birthday 🎂</title>

<style>

body {
margin:0;
text-align:center;
font-family:Georgia,serif;
background:linear-gradient(135deg,#0f4c81,#dbe9f4,#8fb8d8);
min-height:100vh;
padding-top:50px;
overflow:hidden;
}


#countdown {
color:white;
font-size:35px;
margin-top:150px;
}


#question {
display:none;
background:white;
width:85%;
max-width:420px;
margin:auto;
padding:30px;
border-radius:25px;
box-shadow:0 0 25px gray;
}


button {
padding:15px 30px;
margin:15px;
border:none;
border-radius:30px;
font-size:20px;
cursor:pointer;
}


.yes {
background:#0f4c81;
color:white;
}


.no {
background:#ddd;
}


#card {
display:none;
background:white;
width:85%;
max-width:500px;
margin:auto;
padding:25px;
border-radius:25px;
box-shadow:0 0 25px gray;
animation:appear 2s;
}


@keyframes appear {
from {
opacity:0;
transform:scale(.5);
}
to {
opacity:1;
transform:scale(1);
}
}


img {
width:250px;
height:250px;
object-fit:cover;
border-radius:50%;
border:8px solid silver;
box-shadow:0 0 25px #0f4c81;
}


h1 {
font-size:40px;
color:gold;
text-shadow:0 0 15px orange;
animation:shine 2s infinite alternate;
}


@keyframes shine {
from {
text-shadow:0 0 5px gold;
}
to {
text-shadow:0 0 25px orange;
}
}


p {
font-size:20px;
line-height:1.5;
}


#secret {
display:none;
margin-top:20px;
font-size:20px;
color:#0f4c81;
}


</style>
